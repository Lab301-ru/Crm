project_id = "crm"

[db]
major_version = 15

[auth]
# Локальная разработка: фронтенд Vite. Для облака URL задаются
# в Dashboard → Authentication → URL Configuration (Этап 17).
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/reset-password"]
# Самостоятельной регистрации нет: сотрудников создаёт админ
# через Edge Function admin-users (service_role)
enable_signup = false

[auth.email]
enable_confirmations = false

[functions.notify-dispatch]
verify_jwt = true   # вызывает pg_cron с service-ключом; внутри доп. проверка

[functions.public-status]
verify_jwt = false  # публичная страница по QR-токену; rate limiting внутри

[functions.telegram-webhook]
verify_jwt = false  # Telegram аутентифицируется секретным заголовком

[functions.admin-users]
# verify_jwt=false, чтобы платформа не отклоняла OPTIONS-preflight без
# токена (иначе браузер видит CORS-ошибку с localhost:5173). Аутентификация
# не теряется: функция сама проверяет JWT и роль admin (admin.auth.getUser
# + profiles.role) до любого действия.
verify_jwt = false
