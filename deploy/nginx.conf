server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 1024;

  # Хешированные ассеты Vite — кешировать навсегда
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Service worker и оболочка PWA должны обновляться сразу
  location = /sw.js            { add_header Cache-Control "no-cache"; }
  location = /registerSW.js    { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
  location = /index.html       { add_header Cache-Control "no-cache"; }

  # SPA: все маршруты (включая /status/<token>) отдаём через index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
