name: Deploy backend (Supabase)

# Деплой миграций и Edge Functions в облачный проект Supabase.
# Запускается при изменениях в supabase/ на main или вручную.
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — Personal Access Token (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF  — ref проекта (Settings → General)
#   SUPABASE_DB_PASSWORD  — пароль базы (Settings → Database)
#
# Фронтенд деплоится git-интеграцией хостинга статики (Vercel /
# Netlify / Cloudflare Pages) — см. docs/stages/stage-16-ci-cd.md.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Привязка к проекту
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
      - name: Миграции
        run: supabase db push
      - name: Edge Functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
