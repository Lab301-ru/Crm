name: Deploy backend (Supabase)

# Опциональный авто-деплой миграций и Edge Functions в облачный Supabase.
# Работает, ТОЛЬКО если в репозитории заданы секреты:
#   SUPABASE_ACCESS_TOKEN — Personal Access Token (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF  — ref проекта (Settings → General)
#   SUPABASE_DB_PASSWORD  — пароль базы (Settings → Database)
# Если секретов нет — джоб не падает, а тихо пропускается (миграции в этом
# случае применяются вручную в SQL Editor / `supabase db push` локально).
#
# Фронтенд деплоит git-интеграция Vercel — этот workflow его не касается.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Проверка секретов
        id: check
        run: |
          if [ -n "${SUPABASE_ACCESS_TOKEN}" ] && [ -n "${PROJECT_REF}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Секреты Supabase не заданы — авто-деплой бэкенда пропущен (применяйте миграции вручную)."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'
      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.configured == 'true'
        with:
          version: latest
      - name: Привязка к проекту
        if: steps.check.outputs.configured == 'true'
        run: supabase link --project-ref "${PROJECT_REF}"
      - name: Миграции
        if: steps.check.outputs.configured == 'true'
        run: supabase db push
      # Деплой функций не зависит от миграций: проблема с подключением к БД
      # (например, неверный пароль) не должна блокировать выкладку Edge Functions.
      # Функциям нужен только SUPABASE_ACCESS_TOKEN, а не пароль БД.
      - name: Edge Functions
        if: ${{ always() && steps.check.outputs.configured == 'true' }}
        run: supabase functions deploy --project-ref "${PROJECT_REF}"
