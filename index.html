<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F17" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ultraCRM" />
    <title>ultraCRM</title>
    <script>
      // Применяем сохранённую тему до первой отрисовки, чтобы не было вспышки.
      (function () {
        try {
          if (localStorage.getItem("crm-theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#f4f6fa");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
